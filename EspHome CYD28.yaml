binary_sensor:


 
# --- NUMERIC SENSOR CONFIG ---
sensor:
  - platform: homeassistant
    id: ha_r1c1
    entity_id: ${r1c1_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: val_r1c1
            text: !lambda |-
              return str_sprintf("${r1c1_format}", x);
        - lvgl.label.update:
            id: icon_r1c1
            text_color: !lambda |-
              if (x > ${r1c1_thresh_0}) return lv_color_hex(${r1c1_thresh_0_color});
              if (x > ${r1c1_thresh_1}) return lv_color_hex(${r1c1_thresh_1_color});
              return lv_color_hex(${r1c1_thresh_2_color});

