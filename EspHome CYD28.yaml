  r3c2_icon_color: "0xFFA500"
  r3c2_format: '%.1f°C'
  r3c2_thresh_0: "30"
  r3c2_thresh_0_color: "0xFF0000"
  r3c2_thresh_1: "20"
  r3c2_thresh_1_color: "0xFFA500"
  r3c2_thresh_2: "0"
