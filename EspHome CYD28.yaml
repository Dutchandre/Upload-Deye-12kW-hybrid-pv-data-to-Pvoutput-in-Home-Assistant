substitutions:
  # --- Device ---
 # device_name: "hamon" # Use the device name you entered when setting up a new ESPHome device
  #friendly_name: "HAMon" # Can be whatever you like

  # --- Icon Glyphs ---
  # List each unique icon ONCE here. If you use the same icon multiple times below,
  # only include it once in this list to avoid "duplicate glyph" errors.
  # Example: If r1c1_icon and r2c1_icon both use "\uea0b", only list "\uea0b" once.
  icon_glyphs: "\uea0b\ue1ff\ue3e7\ueb58"

  # --- Row 1, Column 1 ---
  r1c1_entity: "sensor.inverter_internal_power"
  r1c1_type: "sensor"
  r1c1_label: "Power net"
  r1c1_icon: "\uea0b"
  r1c1_icon_color: "0xFFA500"
  r1c1_format: '%.0fW'
  r1c1_thresh_0: "12000"
  r1c1_thresh_0_color: "0xFF0000"
  r1c1_thresh_1: "0"
  r1c1_thresh_1_color: "0xFFA500"
  r1c1_thresh_2: "-12000"
  r1c1_thresh_2_color: "0x32CD32"

  # --- Row 1, Column 2 ---
  r1c2_entity: "sensor.192168197_total_system_power"
  r1c2_type: "sensor"
  r1c2_label: "Power home"
  r1c2_icon: "\uea0b"
  r1c2_icon_color: "0xFFA500"
  r1c2_format: '%.0fW'
  r1c2_thresh_0: "5000"
  r1c2_thresh_0_color: "0xFF0000"
  r1c2_thresh_1: "3000"
  r1c2_thresh_1_color: "0xFFA500"
  r1c2_thresh_2: "-5000"
  r1c2_thresh_2_color: "0x32CD32"

  # --- Row 2, Column 1 ---
  r2c1_entity: "sensor.pace_bms_bms1_soc"
  r2c1_type: "sensor"
  r2c1_label: "SOC 1"
  r2c1_icon: "\uea0b"
  r2c1_icon_color: "0xFFA500"
  r2c1_format: '%.1f%%'
  r2c1_thresh_0: "100"
  r2c1_thresh_0_color: "0x00FF33"
  r2c1_thresh_1: "50"
  r2c1_thresh_1_color: "0xFFA500"
  r2c1_thresh_2: "0"
  r2c1_thresh_2_color: "0xCD5132"

  # --- Row 2, Column 2 ---
  r2c2_entity: "sensor.wh2650a_temperature_1"
  r2c2_type: "sensor"
  r2c2_label: "Woonkamer"
  r2c2_icon: "\ue1ff"
  r2c2_icon_color: "0xFFA500"
  r2c2_format: '%.1f°C'
  r2c2_thresh_0: "30"
  r2c2_thresh_0_color: "0xFF0000"
  r2c2_thresh_1: "25"
  r2c2_thresh_1_color: "0xFFA500"
  r2c2_thresh_2: "20"
  r2c2_thresh_2_color: "0x32CD32"

  # --- Row 3, Column 1 ---
  r3c1_entity: "sensor.pace_bms_bms2_soc"
  r3c1_type: "sensor"
  r3c1_label: "SOC 2"
  r3c1_icon: "\uea0b"
  r3c1_icon_color: "0xFFA500"
  r3c1_format: '%.1f%%'
  r3c1_thresh_0: "100"
  r3c1_thresh_0_color: "0x00FF1E"
  r3c1_thresh_1: "50"
  r3c1_thresh_1_color: "0xFFA500"
  r3c1_thresh_2: "0"
  r3c1_thresh_2_color: "0xCD3232"

  # --- Row 3, Column 2 ---
  r3c2_entity: "sensor.wh2650a_temperature_8"
